name: Deploy

# main に入ったコードを本番へ反映する。
# 手動デプロイだと main と本番がずれる（#13 で実際に露呈した）。
on:
  push:
    branches: [main]
  # 失敗時などに手で流せるようにしておく
  workflow_dispatch:

# 同時に走らせない。古いデプロイが新しいものを上書きしないように。
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC トークンの取得に必要

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: ./scripts/build_lambda.sh

      # 長期のアクセスキーは置かない。OIDC で一時credentialに交換する。
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name loop-engineering-lab \
            --zip-file fileb://infra/build/lambda.zip \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name loop-engineering-lab

      # デプロイして終わりにしない。動いていることまで確認する。
      - name: Health check
        run: |
          URL="https://9sa9pqvlsc.execute-api.ap-northeast-1.amazonaws.com"
          for endpoint in /health /weather /weather/series; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "${URL}${endpoint}")
            echo "${endpoint} -> ${code}"
            if [ "$code" != "200" ]; then
              echo "::error::${endpoint} returned ${code}"
              exit 1
            fi
          done

  # フロント配信。ビルドして S3 に同期し、CloudFront のキャッシュを無効化する。
  # Lambda デプロイとは独立。片方が転けてももう片方は進められる。
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      # バケット名は命名規則（frontend-<account_id>）で決まるので account_id
      # だけ動的に引く。sts:GetCallerIdentity は全ロールに黙って付く権限。
      # 古いファイルは消す（--delete）。ハッシュ付きの旧 JS/CSS が残ると無駄。
      - name: Sync to S3
        run: |
          account_id=$(aws sts get-caller-identity --query Account --output text)
          bucket="loop-engineering-lab-frontend-${account_id}"
          aws s3 sync frontend/dist "s3://${bucket}" --delete --no-progress

      # distribution ID は apply で確定した固定値を直書きする。
      # 当初は list-distributions で引いたが、それには cloudfront:ListDistributions
      # が要り、この権限はリソース ARN で絞れず "*" になる。デプロイロールに広い
      # 権限を持たせないため直書きにした。distribution は作り替えでもしない限り
      # 不変で、変わったらここを 1 行直せばよい（変更は terraform plan にも現れる）。
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E21VLPNM0AUWVR \
            --paths "/*" \
            --no-cli-pager
