name: Deploy

# main に入ったコードを本番へ反映する。
# 手動デプロイだと main と本番がずれる（#13 で実際に露呈した）。
on:
  push:
    branches: [main]
  # 失敗時などに手で流せるようにしておく
  workflow_dispatch:

# 同時に走らせない。古いデプロイが新しいものを上書きしないように。
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC トークンの取得に必要

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: ./scripts/build_lambda.sh

      # 長期のアクセスキーは置かない。OIDC で一時credentialに交換する。
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      - name: Update Lambda code
        run: |
          aws lambda update-function-code \
            --function-name loop-engineering-lab \
            --zip-file fileb://infra/build/lambda.zip \
            --no-cli-pager
          aws lambda wait function-updated \
            --function-name loop-engineering-lab

      # デプロイして終わりにしない。動いていることまで確認する。
      - name: Health check
        run: |
          URL="https://9sa9pqvlsc.execute-api.ap-northeast-1.amazonaws.com"
          for endpoint in /health /weather /weather/series; do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "${URL}${endpoint}")
            echo "${endpoint} -> ${code}"
            if [ "$code" != "200" ]; then
              echo "::error::${endpoint} returned ${code}"
              exit 1
            fi
          done

  # フロント配信。ビルドして S3 に同期し、CloudFront のキャッシュを無効化する。
  # Lambda デプロイとは独立。片方が転けてももう片方は進められる。
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1

      # バケット名と distribution ID はハードコードしない。account_id と
      # プロジェクトタグから引く。infra を作り替えても壊れないようにするため。
      - name: Resolve S3 bucket and CloudFront distribution
        id: targets
        run: |
          account_id=$(aws sts get-caller-identity --query Account --output text)
          bucket="loop-engineering-lab-frontend-${account_id}"
          dist_id=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?Comment=='loop-engineering-lab frontend'].Id | [0]" \
            --output text)
          echo "bucket=${bucket}" >> "$GITHUB_OUTPUT"
          echo "dist_id=${dist_id}" >> "$GITHUB_OUTPUT"
          echo "bucket=${bucket} dist_id=${dist_id}"

      # 古いファイルは消す（--delete）。ハッシュ付きの旧 JS/CSS が残ると無駄。
      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist "s3://${{ steps.targets.outputs.bucket }}" \
            --delete --no-progress

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.targets.outputs.dist_id }}" \
            --paths "/*" \
            --no-cli-pager
